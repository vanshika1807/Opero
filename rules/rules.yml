rules:
  - name: database_timeout
    keywords: ["timeout", "db", "connection"]
    failure: "Database Timeout"
    severity: "P1"
    fix:
      - "Restart database service"
      - "Check DB connections"

  - name: auth_failure
    keywords: ["auth", "unauthorized", "token"]
    failure: "Authentication Error"
    severity: "P2"
    fix:
      - "Validate credentials"
      - "Check token expiry"

  - name: service_down
    keywords: ["503", "unavailable"]
    failure: "Service Unavailable"
    severity: "P1"
    fix:
      - "Restart service"
      - "Check server health"
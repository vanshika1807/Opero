name: OPERO Incident Flow
description: >
  Automatically triages pipeline failures, creates incidents,
  and notifies the team when a GitLab pipeline fails.

definition:
  on:
    pipeline:
      status:
        - failed

  steps:
    - name: analyze_failure
      agent: OPERO
      prompt: |
        A pipeline has just failed in this project.
        Pipeline details: {{ pipeline.url }}
        Branch: {{ pipeline.ref }}
        Failed at: {{ pipeline.created_at }}

        Please analyze this as an incident:
        1. Identify the failure type
        2. Assign severity P1-P4
        3. Suggest immediate fix steps
        4. Generate a triage summary

    - name: create_issue
      action: create_issue
      title: "OPERO: Pipeline failure on {{ pipeline.ref }}"
      description: "{{ steps.analyze_failure.output }}"
      labels:
        - incident
        - opero-auto